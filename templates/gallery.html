<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screendex – Gallery</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">Screendex</span>
      <span class="brand-tag">AI-Powered</span>
    </div>
    <div class="nav-links">
      <a href="/">Search</a>
      <a href="/upload">Upload</a>
      <a href="/gallery" class="active">Gallery</a>
      <a href="/profile">Profile</a>
      <a href="/admin">Admin</a>
      <a href="/api/docs" target="_blank">API Docs</a>
      <a href="/logout" style="color:#F44336;">Logout</a>
    </div>
  </nav>

  <main class="gallery-main">
    <div class="gallery-header">
      <h1 class="page-title">Image Gallery</h1>
      <div class="gallery-controls">
        <select id="statusFilter" class="filter-select">
          <option value="">All Status</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="failed">Failed</option>
        </select>
        <select id="typeFilter" class="filter-select">
          <option value="">All Types</option>
          <option value="born_digital">Born-Digital</option>
          <option value="scene_text">Scene Text</option>
        </select>
        <select id="categoryFilter" class="filter-select">
          <option value="">All Categories</option>
          <option value="Receipt">Receipt</option>
          <option value="Code Snippet">Code Snippet</option>
          <option value="Document">Document</option>
          <option value="Social Media">Social Media</option>
          <option value="Business Card">Business Card</option>
          <option value="Lecture Note">Lecture Note</option>
          <option value="Other">Other</option>
        </select>
        <a href="/upload" class="btn-primary">+ Upload</a>
      </div>
    </div>

    <div class="gallery-stats" id="galleryStats"></div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="loading">Loading images...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <script src="/static/js/gallery.js?v=4"></script>
</body>
</html>
